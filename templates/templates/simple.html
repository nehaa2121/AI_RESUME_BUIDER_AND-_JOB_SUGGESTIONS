<!DOCTYPE html>
<html>
    <head>
        <title>Simple Resume</title>
    </head>
    <body>
        <div class="simple">
        <h1>{{ name }}</h1>
        <p>{{ email }} | {{ phone }}</p>

        <div class="section">
            <h2>Summary</h2>
            <p>{{ ai_summary }}</p>
        </div>

        <div class="section">
            <h2>Skills</h2>
            <p>{{ skills }}</p>
        </div>

        <div class="section">
            <h2>Education</h2>
            <p>{{ degree }}-{{college}} ({{ year }})</p>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <p>{{ projects }}</p>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <p>{{ experience }}</p>
        </div>
    </div>
</body>
</html>
